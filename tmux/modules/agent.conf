# termenv — Agent/AI-native tmux settings
# Optimizes tmux for use alongside AI coding agents (Claude Code, etc.)

# Large scrollback for agent output
set -g history-limit 50000

# Escape sequence passthrough (OSC 52 clipboard, etc.)
set -g allow-passthrough on

# Extended keys for better keybinding support
set -s extended-keys on

# Focus events so vim detects file changes from agent edits
set -g focus-events on

# OSC 52 clipboard (works over SSH)
set -g set-clipboard on

# Claude Code — cycle to next idle pane (no prefix, wraps around)
# C-y cycles forward through idle Claude sessions
bind-key -n C-y run-shell "$HOME/.tmux/termenv/scripts/claude-cycle.sh next"
