# termenv — core tmux configuration
# https://github.com/jacksonc/termenv
# All modular configs live at ~/.tmux/termenv/ (symlinked by install.sh)

#==============
# Global
set-window-option -g mode-keys vi
set-option -g prefix C-a
set -g default-terminal "tmux-256color"

# Reload config
bind-key r source-file ~/.tmux.conf \; display "Config reloaded"

#==============
# Source modular configs (symlinked under ~/.tmux/termenv/)
source-file ~/.tmux/termenv/keys.conf
source-file ~/.tmux/termenv/mouse.conf
source-file ~/.tmux/termenv/status.conf

#==============
# Window behavior
setw -g monitor-activity on
set -g visual-activity on
set -g set-titles on
set -g set-titles-string "#T"
set-option -g renumber-windows on

#==============
# Colors
set -g status-style fg=colour136,bg=colour235,default
set -g window-status-style fg=colour244,bg=default,default
set -g window-status-current-style fg=colour166,bg=default,bright
set -g pane-border-style fg=colour240,default
set -g message-style fg=colour166,bg=colour235,default
set-option -g display-panes-active-colour colour33
set-option -g display-panes-colour colour166
set-window-option -g clock-mode-colour colour64

#==============
# Platform-specific
if-shell '[ "$TERMENV_OS" = "mac" ]' \
  'source-file -q ~/.tmux/termenv/platform/mac.conf'
if-shell '[ "$TERMENV_OS" = "linux" ]' \
  'source-file -q ~/.tmux/termenv/platform/linux.conf'

#==============
# Agent module (opt-in)
if-shell '[ "$TERMENV_AGENT" = "1" ]' \
  'source-file -q ~/.tmux/termenv/modules/agent.conf'

#==============
# Plugins (tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize tpm (keep at bottom)
run -b '~/.tmux/plugins/tpm/tpm'
