# termenv — status bar configuration

set -g status-right-length 200
set -g status-left "❯ "
set -g status-interval 1
set -g status-right "#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null) [#(command -v tmux-mem-cpu-load >/dev/null && tmux-mem-cpu-load -i 1 || cat /proc/loadavg 2>/dev/null | cut -d' ' -f1-3 || sysctl -n vm.loadavg 2>/dev/null | tr -d '{}')] #H [%a %Y-%m-%d %H:%M]"
