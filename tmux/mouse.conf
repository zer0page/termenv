# termenv — mouse + clipboard configuration

set -g mouse on

# Toggle mouse: prefix+m on, prefix+M off
bind M set -g mouse on \; display "Mouse: ON"
bind m set -g mouse off \; display "Mouse: OFF"

# Vi copy mode with system clipboard integration
# Use Option+drag for native terminal select
# Cmd+V to paste (handled by terminal)
# prefix+[ to enter copy mode, v to select, y to yank
bind -T copy-mode-vi v send -X begin-selection

if-shell 'command -v pbcopy' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"; \
   bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"'

if-shell 'command -v xclip' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"; \
   bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard"'

if-shell 'command -v wl-copy' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"; \
   bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"'

# Mouse wheel enters copy mode for scrollback
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" \
  "send-keys -M" \
  "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
